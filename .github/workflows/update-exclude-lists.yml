name: update exclude lists
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pvd-dog:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'jmarkin'
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - run: nix develop --command bash scripts/update-pvd-dog.sh
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/lists/pvd-dog-ipset.txt
          git diff --cached --quiet || (git commit -m "lists: update pvd-dog ipset exclude list" && git push)
