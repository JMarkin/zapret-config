name: flake update
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'jmarkin'
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - run: nix flake update
      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "flake: update inputs"
          title: "flake: update inputs"
          body: Automated flake update.
          branch: chore/flake-update
